name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 13:00 UTC sweep — catches secrets that slipped past PR review
    # via merge commits, force pushes to feature branches, or history
    # rewrites. Daily (not weekly) because a leaked credential's blast
    # radius compounds with every passing day.
    #
    # Especially important for this repo: the Rust keystore handles
    # provider API keys (Anthropic, OpenAI, Google, etc.). A leaked
    # test key in a commit could grant production access.
    - cron: "0 13 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: gitleaks scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history — gitleaks can then scan past commits, not just
          # the current tree.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Free for public repos. If this repo is moved private, set
          # GITLEAKS_LICENSE in repo secrets.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
